{{- if not (has .Values.loadBalancer.mode (list "none" "cilium" "shared")) }}
{{- fail (printf "loadBalancer.mode must be one of \"none\", \"cilium\", or \"shared\"; got %q" .Values.loadBalancer.mode) }}
{{- end }}
---
kind: Deployment
apiVersion: apps/v1

metadata:
  name: {{ include "ckic-manager.fullname" . }}
  labels:
    {{- include "ckic-manager.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.updateStrategy.type }}
    {{- if eq .Values.updateStrategy.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.updateStrategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.updateStrategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "ckic-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ckic-manager.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ckic-manager.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 60 }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}/{{ .Values.image.image }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CKIC_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - "--node-label={{ .Values.config.nodeLabel }}"
            - "--config-map={{ .Values.config.configMapName }}"
            - "--bootstrap-default-config={{ .Values.config.bootstrapDefaultConfig }}"
            - "--config-resync-interval={{ .Values.config.configResyncInterval }}"
            - "--leader-elect={{ .Values.leaderElection.enabled }}"
            - "--leader-election-lease-name={{ .Values.leaderElection.leaseName }}"
            - "--leader-election-lease-duration={{ .Values.leaderElection.leaseDuration }}"
            - "--leader-election-renew-deadline={{ .Values.leaderElection.renewDeadline }}"
            - "--leader-election-retry-period={{ .Values.leaderElection.retryPeriod }}"
            {{- if .Values.probes.enabled }}
            - "--health-bind-address=:{{ .Values.probes.port }}"
            {{- else }}
            - "--health-bind-address="
            {{- end }}
            - "--comm-method={{ .Values.config.communicationMethod }}"
            - "--log-level={{ .Values.config.logLevel | default "info" }}"
            - "--caddy-image={{ .Values.config.caddyImage }}"
            - "--image-pull-policy={{ .Values.config.imagePullPolicy }}"
            - "--prepull-image={{ .Values.config.prePullImage }}"
            - "--loadbalancer-mode={{ if and (not .Values.config.useHostNetwork) (eq .Values.loadBalancer.mode "cilium") }}cilium{{ else }}none{{ end }}"
            - "--env-secret={{ .Values.config.secretName }}"
            {{- range .Values.config.secretEnvKeys }}
            - "--env-keys={{ . }}"
            {{- end }}
            {{- if .Values.config.dataVolumePVC }}
            - "--data-pvc={{ .Values.config.dataVolumePVC }}"
            {{- end }}
            {{- if .Values.config.configVolumePVC }}
            - "--config-pvc={{ .Values.config.configVolumePVC }}"
            {{- end }}
            {{- range .Values.config.externalEndpoints }}
            - "--external-endpoints={{ . }}"
            {{- end }}
            - "--use-host-network={{ .Values.config.useHostNetwork }}"
            {{- if .Values.config.caddyAdminOriginKey }}
            - "--caddy-admin-origin-key={{ .Values.config.caddyAdminOriginKey }}"
            {{- end }}
            - "--external-enable={{ .Values.config.external.enable }}"
            {{- if .Values.config.external.enable }}
            - "--external-label={{ .Values.config.external.label }}"
            - "--external-ns-mode={{ .Values.config.external.nsMode }}"
            {{- if .Values.config.external.allowNamespaces }}
            - "--external-allow-namespaces={{ join "," .Values.config.external.allowNamespaces }}"
            {{- end }}
            {{- if .Values.config.external.denyNamespaces }}
            - "--external-deny-namespaces={{ join "," .Values.config.external.denyNamespaces }}"
            {{- end }}
            - "--external-publish-aggregated={{ .Values.config.external.publishAggregated }}"
            - "--external-aggregated-config-name={{ .Values.config.external.aggregatedConfigName }}"
            {{- end }}
          {{- if .Values.probes.enabled }}
          ports:
            - name: health
              containerPort: {{ .Values.probes.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: health
            initialDelaySeconds: {{ .Values.probes.livenessInitialDelaySeconds }}
            periodSeconds: {{ .Values.probes.livenessPeriodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: health
            initialDelaySeconds: {{ .Values.probes.readinessInitialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readinessPeriodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

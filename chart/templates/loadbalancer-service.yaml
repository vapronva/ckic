{{- if and (eq .Values.loadBalancer.mode "shared") (not .Values.config.useHostNetwork) }}
---
kind: Service
apiVersion: v1

metadata:
  name: caddy-loadbalancer
  labels:
    {{- include "ckic-manager.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    {{- if eq .Values.loadBalancer.clientIP "proxy-protocol" }}
    {{- $ppv := .Values.loadBalancer.proxyProtocolVersion | default "v1" }}
    {{- if not (has $ppv (list "v1" "v2")) }}
    {{- fail (printf "loadBalancer.proxyProtocolVersion must be \"v1\" or \"v2\", got %q" $ppv) }}
    {{- end }}
    loadbalancer.openstack.org/proxy-protocol: {{ $ppv | quote }}
    {{- end }}
    {{- with .Values.loadBalancer.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

spec:
  type: LoadBalancer
  selector:
    app: caddy
    ckic.cmld.ru/caddy-managed: "true"
  externalTrafficPolicy: {{ .Values.loadBalancer.externalTrafficPolicy | default (ternary "Cluster" "Local" (eq .Values.loadBalancer.clientIP "proxy-protocol")) }}
  {{- with .Values.loadBalancer.loadBalancerIP }}
  loadBalancerIP: {{ . | quote }}
  {{- end }}
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
    {{- if and (eq .Values.loadBalancer.clientIP "local") .Values.loadBalancer.enableUDP }}
    - name: http-udp
      port: 80
      targetPort: 80
      protocol: UDP
    - name: https-udp
      port: 443
      targetPort: 443
      protocol: UDP
    {{- end }}
{{- end }}

{{- if .Values.serviceAccount.create -}}
---
kind: ServiceAccount
apiVersion: v1

metadata:
  name: {{ include "ckic-manager.serviceAccountName" . }}
  labels:
    {{- include "ckic-manager.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

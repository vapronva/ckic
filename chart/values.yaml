---
replicaCount: 1

image:
  repository: docker.horse
  image: vapronva/ckic/manager
  tag: 0.21.0
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

resources:
  requests:
    cpu: 50m
    memory: 15Mi

nodeSelector: {}
tolerations: []
affinity: {}

leaderElection:
  enabled: true
  leaseName: ckic-manager-leader
  leaseNamespace: ""
  leaseDuration: 15s
  renewDeadline: 10s
  retryPeriod: 2s

probes:
  enabled: true
  port: 8081
  livenessPath: /healthz
  readinessPath: /readyz
  livenessInitialDelaySeconds: 15
  livenessPeriodSeconds: 20
  readinessInitialDelaySeconds: 5
  readinessPeriodSeconds: 10

config:
  nodeLabel: ckic.cmld.ru/enabled
  configMapName: caddy-config
  configMapNamespace: caddy-system
  bootstrapDefaultConfig: false
  communicationMethod: clusterip
  logLevel: info
  caddyImage: docker.horse/oss-images/zerossl-caddy/caddy:2.11.1-alpine
  enableLoadBalancer: true
  useHostNetwork: false
  httpHostPort: 80
  httpsHostPort: 443
  caddyAdminOriginKey: ""
  preferSavedState: false
  secretName: caddy-env
  secretEnvKeys: []
  dataVolumePVC: caddy-data-lv
  configVolumePVC: caddy-config-lv
  externalEndpoints: []
  external:
    enable: false
    label: ckic.cmld.ru/aggregate=true
    nsMode: all
    allowNamespaces: []
    denyNamespaces: []
    publishAggregated: true
    aggregatedConfigName: ckic-caddy-config-working

caddyConfig:
  debug: true
  servers: ""
  global: |
    email {env.ACME_EMAIL}
    acme_dns powerdns {env.POWERDNS_SERVER_URL} {env.POWERDNS_API_TOKEN}
  global_optional: ""
  caddyfile: ""
  caddyfile_optional: ""

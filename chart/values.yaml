---
replicaCount: 1

image:
  repository: rg.gl.vprw.ru
  image: vapronva/ckic/manager
  tag: 0.15.1
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

resources:
  limits:
    memory: 20Mi
  requests:
    cpu: 5m
    memory: 10Mi

nodeSelector: {}
tolerations: []
affinity: {}

config:
  nodeLabel: ckic.cmld.ru/enabled
  configMapName: caddy-config
  configMapNamespace: caddy-system
  communicationMethod: clusterip
  logLevel: info
  caddyImage: rg.gl.vprw.ru/oss-images/zerossl-caddy/caddy:2.10.2-alpine
  enableLoadBalancer: true
  useHostNetwork: false
  httpHostPort: 80
  httpsHostPort: 443
  caddyAdminOriginKey: ""
  preferSavedState: false
  secretName: caddy-env
  secretEnvKeys: []
  dataVolumePVC: caddy-data-lv
  configVolumePVC: caddy-config-lv
  externalEndpoints: []
  external:
    enable: false
    label: ckic.cmld.ru/aggregate=true
    nsMode: all
    allowNamespaces: []
    denyNamespaces: []
    publishAggregated: true
    aggregatedConfigName: ckic-caddy-config-working

caddyConfig:
  debug: true
  servers: ""
  global: |
    email {env.ACME_EMAIL}
    acme_dns powerdns {env.POWERDNS_SERVER_URL} {env.POWERDNS_API_TOKEN}
  global_optional: ""
  caddyfile: ""
  caddyfile_optional: ""
